<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ricostruzione Animazione Submit Button</title>
    <style>
        /* --- Reset e Layout Base --- */
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* --- Contenitore del Pulsante --- */
        .button-container {
            position: relative;
        }

        /* --- Stile Base del Pulsante (Stato Iniziale) --- */
        .submit-btn {
            display: block;
            width: 200px;
            height: 60px;
            background-color: #2c3e50; /* Colore scuro originale */
            color: white;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
            border-radius: 30px; /* Arrotondato */
            cursor: pointer;
            outline: none;
            position: relative;
            
            /* Transizione fluida per larghezza, colore e bordi */
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Testo all'interno del pulsante */
        .submit-btn span {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            transition: opacity 0.2s ease;
        }

        /* Hover effetto base */
        .submit-btn:hover {
            background-color: #34495e;
        }

        /* =========================================
           FASE 1: LOADING (Il pulsante diventa cerchio)
           Attivata dalla classe .is-loading
           ========================================= */
        
        .submit-btn.is-loading {
            width: 60px; /* Diventa quadrato/cerchio */
            background-color: transparent; /* Sfondo trasparente per mostrare il bordo */
            color: transparent; /* Nasconde il testo */
            border: 4px solid #e0e6ec; /* Bordo grigio chiaro di base */
            cursor: default;
            box-shadow: none;
        }

        /* Nasconde il testo */
        .submit-btn.is-loading span {
            opacity: 0;
        }

        /* --- Lo Spinner (L'arco rotante) --- */
        /* Usiamo ::after per creare l'arco blu che ruota */
        .submit-btn.is-loading::after {
            content: '';
            position: absolute;
            width: 60px; /* Stessa dimensione del cerchio */
            height: 60px;
            border-radius: 50%;
            top: -4px; /* Compensa lo spessore del bordo del pulsante */
            left: -4px;
            
            /* Crea l'arco blu: bordo trasparente tranne un lato */
            border: 4px solid transparent;
            border-top-color: #3498db; /* Colore blu dello spinner */
            
            /* Animazione di rotazione infinita */
            animation: spin 0.8s linear infinite; 
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }


        /* =========================================
           FASE 2: CHECKED (Successo!)
           Attivata dalla classe .is-checked
           ========================================= */

        .submit-btn.is-checked {
            width: 60px;
            background-color: #2ecc71; /* Verde Successo */
            border: 4px solid #2ecc71; /* Bordo verde coordinato */
            animation: pulseSuccess 0.5s ease; /* Piccolo "balzo" finale */
        }

        /* Rimuove lo spinner */
        .submit-btn.is-checked::after {
            display: none;
        }

        /* Piccola animazione di pulsazione al successo */
        @keyframes pulseSuccess {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* =========================================
           FASE 3: IL SEGNO DI SPUNTA (Checkmark)
           Usiamo ::before animando la larghezza/altezza
           ========================================= */

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-45deg); /* Ruotato per formare la 'L' */
            
            /* Inizialmente invisibile */
            width: 0;
            height: 0;
            
            /* Stile del check */
            border-left: 4px solid white;
            border-bottom: 4px solid white;
            border-radius: 2px;
            
            opacity: 0;
            z-index: 2;
        }

        /* Quando è confermato, animiamo il check */
        .submit-btn.is-checked::before {
            opacity: 1;
            /* Le dimensioni finali del checkmark */
            width: 25px; 
            height: 12px;
            
            /* Transizione ritardata per apparire DOPO il verde */
            transition: width 0.2s ease 0.3s, height 0.2s ease 0.5s;
        }

    </style>
</head>
<body>

    <div class="button-container">
        <button id="submitBtn" class="submit-btn">
            <span>Submit</span>
        </button>
    </div>

    <script>
        /* --- JavaScript per simulare il flusso --- */
        const btn = document.getElementById('submitBtn');

        btn.addEventListener('click', function() {
            // Se è già in caricamento o completato, non fare nulla
            if (btn.classList.contains('is-loading') || btn.classList.contains('is-checked')) return;

            // 1. Inizia il Loading
            btn.classList.add('is-loading');

            // 2. Simula il caricamento (es. 2 secondi)
            setTimeout(() => {
                btn.classList.remove('is-loading');
                // 3. Mostra lo stato Success
                btn.classList.add('is-checked');
            }, 2500); // 2.5 secondi di caricamento
        });
    </script>

</body>
</html>
