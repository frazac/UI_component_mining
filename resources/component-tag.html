<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Custom Tags</title>
    <style>
        body {
            /* Sfumature del colore di sfondo solito con pattern zig zag */
            background: linear-gradient(135deg, #eee6e4 0%, #d4c4c0 50%, #eee6e4 100%);
            background-image: 
                linear-gradient(135deg, rgba(205, 106, 106, 0.1) 25%, transparent 25%), 
                linear-gradient(225deg, rgba(205, 106, 106, 0.1) 25%, transparent 25%), 
                linear-gradient(45deg, rgba(205, 106, 106, 0.1) 25%, transparent 25%), 
                linear-gradient(315deg, rgba(205, 106, 106, 0.1) 25%, transparent 25%);
            background-position: 10px 0, 10px 0, 0 0, 0 0;
            background-size: 20px 20px;
            background-repeat: repeat;
            
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        }

        .tag-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px 20px; /* Ridotto spazio tra tag */
            max-width: 500px;
            padding: 40px;
            justify-content: flex-start; /* Allineamento a sinistra */
        }

        .tag {
            position: relative;
            display: inline-block;
            height: 34px;
            line-height: 34px;
            padding: 0 10px 0 12px;
            margin-left: 20px; /* Spazio per la punta a sinistra */
            
            /* Colore crimson */
            background: #dc143c; 
            color: #fff;
            text-decoration: none;
            font-size: 15px; /* Aumentato dimensione testo */
            font-weight: bold;
            text-transform: lowercase;
            
            border-bottom-right-radius: 8px;
            border-top-right-radius: 8px;
            border-bottom-left-radius: 0;
            border-top-left-radius: 0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: all 0.2s ease;
            cursor: pointer;
            
            outline: rgba(255, 255, 255, 0.5);
            outline-offset: -4px;
            outline-width: 2px;
            outline-style: dotted;
        }

        /* La punta del tag a sinistra */
        .tag::after {
            content: "";
            position: absolute;
            left: -17px;
            top: 0;
            width: 0;
            height: 0;
            border-top: 17px solid transparent;
            border-bottom: 17px solid transparent;
            border-right: 17px solid #dc143c; /* Punta a sinistra crimson */
            transition: border-color 0.2s ease;
        }

        /* Il forellino bianco più grande */
        .tag::before {
            content: "";
            position: absolute;
            top: 13px;
            left: -3px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #fff;
            box-shadow: inset 0 1px 1px rgba(0,0,0,0.2);
            z-index: 1;
        }

        /* Varianti di colore per i tag - tutti giallo acido */
        .tag.brown { background: #9acd32; }
        .tag.brown::after { border-right-color: #9acd32; }

        .tag.ochre { background: #9acd32; }
        .tag.ochre::after { border-right-color: #9acd32; }

        .tag.dark-green { background: #9acd32; }
        .tag.dark-green::after { border-right-color: #9acd32; }

        /* Effetto Hover */
        .tag:hover {
            background: #c4a57b; /* Marroncino più dolce */
            color: #fff;
            transform: translateY(-2px);
        }
        .tag:hover::after {
            border-right-color: #c4a57b; /* Marroncino più dolce */
        }
    </style>
</head>
<body>

<div class="tag-container">
    <div class="tag">high resolution</div>
    <div class="tag">icons</div>
    <div class="tag">layer styles</div>
    <div class="tag">layout</div>
    <div class="tag">letterpress</div>
    <div class="tag">magazine</div>
    <div class="tag">menu</div>
    <div class="tag">metal</div>
    <div class="tag">navigation</div>
    <div class="tag">paper</div>
    <div class="tag">pattern</div>
    <div class="tag">plastic</div>
    <div class="tag">ribbon</div>
    <div class="tag">seamless</div>
    <div class="tag">simple</div>
</div>

</body>
</html>
