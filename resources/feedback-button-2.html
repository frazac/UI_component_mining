<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Button Animation - Auto Demo</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #f5f5f5;
            padding: 60px 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .demo-container {
            text-align: center;
        }

        .demo-title {
            font-size: 24px;
            font-weight: 600;
            color: #333;
            margin-bottom: 40px;
        }

        /* --- Button Styles --- */
        .feedback-btn {
            position: relative;
            width: 200px;
            height: 56px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 28px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* --- Button States --- */
        .feedback-btn.default {
            /* Default state - nothing special */
        }

        .feedback-btn.loading {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            pointer-events: none;
        }

        .feedback-btn.success {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            pointer-events: none;
        }

        /* --- Content Container --- */
        .btn-content {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        /* --- Text Content --- */
        .btn-text {
            opacity: 1;
            transition: opacity 0.3s ease;
        }

        .feedback-btn.loading .btn-text,
        .feedback-btn.success .btn-text {
            opacity: 0;
        }

        /* --- Loading Spinner --- */
        .loading-spinner {
            position: absolute;
            width: 24px;
            height: 24px;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.3s ease;
        }

        .feedback-btn.loading .loading-spinner {
            opacity: 1;
            transform: scale(1);
        }

        .spinner-circle {
            width: 100%;
            height: 100%;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* --- Success Checkmark --- */
        .success-checkmark {
            position: absolute;
            width: 24px;
            height: 24px;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.3s ease;
        }

        .feedback-btn.success .success-checkmark {
            opacity: 1;
            transform: scale(1);
        }

        .checkmark-circle {
            width: 100%;
            height: 100%;
            border: 3px solid white;
            border-radius: 50%;
            animation: checkmarkCircle 0.6s ease;
        }

        .checkmark-stem {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 3px;
            height: 12px;
            background: white;
            transform: translate(-50%, -50%) rotate(45deg);
            transform-origin: center bottom;
            animation: checkmarkStem 0.3s ease 0.3s forwards;
            opacity: 0;
        }

        .checkmark-kick {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 8px;
            height: 3px;
            background: white;
            transform: translate(-50%, -50%) rotate(-45deg);
            transform-origin: center left;
            animation: checkmarkKick 0.3s ease 0.5s forwards;
            opacity: 0;
        }

        @keyframes checkmarkCircle {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            50% {
                transform: scale(1.1);
                opacity: 1;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes checkmarkStem {
            0% {
                height: 0;
                opacity: 0;
            }
            100% {
                height: 12px;
                opacity: 1;
            }
        }

        @keyframes checkmarkKick {
            0% {
                width: 0;
                opacity: 0;
            }
            100% {
                width: 8px;
                opacity: 1;
            }
        }

        /* --- Animation Cycle --- */
        .feedback-btn {
            animation: stateCycle 8s ease-in-out infinite;
        }

        @keyframes stateCycle {
            0%, 25% {
                /* Default state */
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            }
            25%, 75% {
                /* Loading state */
                background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            }
            75%, 100% {
                /* Success state */
                background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            }
        }

        /* --- State indicators for demo --- */
        .state-indicator {
            margin-top: 30px;
            font-size: 14px;
            color: #666;
            font-weight: 500;
        }

        .state-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 8px;
            background: #ccc;
            transition: all 0.3s ease;
        }

        .state-dot.active {
            background: #667eea;
            transform: scale(1.2);
        }

        /* --- Progress bar for visual feedback --- */
        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 0 0 28px 28px;
            animation: progressBar 8s linear infinite;
        }

        @keyframes progressBar {
            0% {
                width: 0%;
            }
            25% {
                width: 25%;
                background: rgba(255, 255, 255, 0.3);
            }
            25.1% {
                background: rgba(255, 255, 255, 0.5);
            }
            75% {
                width: 75%;
                background: rgba(255, 255, 255, 0.5);
            }
            75.1% {
                background: rgba(255, 255, 255, 0.7);
            }
            100% {
                width: 100%;
                background: rgba(255, 255, 255, 0.7);
            }
        }
    </style>
</head>
<body>
    <div class="demo-container">
        <h1 class="demo-title">Feedback Button Animation Demo</h1>
        
        <button class="feedback-btn" id="feedbackBtn">
            <div class="btn-content">
                <span class="btn-text">Submit</span>
                
                <!-- Loading Spinner -->
                <div class="loading-spinner">
                    <div class="spinner-circle"></div>
                </div>
                
                <!-- Success Checkmark -->
                <div class="success-checkmark">
                    <div class="checkmark-circle"></div>
                    <div class="checkmark-stem"></div>
                    <div class="checkmark-kick"></div>
                </div>
            </div>
            <div class="progress-bar"></div>
        </button>
        
        <div class="state-indicator">
            <span class="state-dot" id="defaultDot"></span>Default
            <span class="state-dot" id="loadingDot"></span>Loading
            <span class="state-dot" id="successDot"></span>Success
        </div>
    </div>

    <script>
        // Auto-cycle animation states
        const btn = document.getElementById('feedbackBtn');
        const dots = {
            default: document.getElementById('defaultDot'),
            loading: document.getElementById('loadingDot'),
            success: document.getElementById('successDot')
        };

        let currentState = 'default';
        const states = ['default', 'loading', 'success'];
        let stateIndex = 0;

        function updateState() {
            // Remove all state classes
            btn.classList.remove('default', 'loading', 'success');
            dots.default.classList.remove('active');
            dots.loading.classList.remove('active');
            dots.success.classList.remove('active');
            
            // Add current state class
            btn.classList.add(currentState);
            dots[currentState].classList.add('active');
        }

        function cycleStates() {
            stateIndex = (stateIndex + 1) % states.length;
            currentState = states[stateIndex];
            updateState();
        }

        // Initialize
        updateState();

        // Auto-cycle every 2.67 seconds (8 seconds total cycle / 3 states)
        setInterval(cycleStates, 2670);

        // Optional: Click to restart cycle
        btn.addEventListener('click', function() {
            stateIndex = 0;
            currentState = states[0];
            updateState();
        });
    </script>
</body>
</html>
