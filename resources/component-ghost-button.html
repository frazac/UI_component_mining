<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI Components Mining . Feedback paradigm . Francesco Zaccaria</title>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link type="text/css" rel="stylesheet" href="resources/tipografia.css">
    <link type="text/css" rel="stylesheet" href="resources/stile.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <!-- Matomo -->
    <script>
        var _paq = window._paq = window._paq || [];
        /* tracker methods like "setCustomDimension" should be called before "trackPageView" */
        _paq.push(['trackPageView']);
        _paq.push(['enableLinkTracking']);
        (function () {
            var u = "https://matomo.masterismi.com/";
            _paq.push(['setTrackerUrl', u + 'matomo.php']);
            _paq.push(['setSiteId', '15']);
            var d = document,
                g = d.createElement('script'),
                s = d.getElementsByTagName('script')[0];
            g.async = true;
            g.src = u + 'matomo.js';
            s.parentNode.insertBefore(g, s);
        })();
    </script>
    <!-- End Matomo Code -->
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #eee6e4;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 80%;
            max-width: 600px;
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .row {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* --- Prima Riga (In Alto) --- */
        .row-top {
            background-color: #f8f9fa; /* Colore di base pulito */
            background-image: repeating-linear-gradient(-45deg, #e9ecef 0px, #e9ecef 2px, transparent 2px, transparent 8px); /* Nuovo pattern a linee */
        }

        .button-top {
            color: #000000;
            border: 2px solid #000000;
            border-radius: 50px;
            padding: 15px 40px;
            font-size: 1.3em;
            text-transform: uppercase;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            transition: background 0.3s;
        }
        .button-top:hover {
            background: rgba(255, 255, 255, 1);
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        /* --- Seconda Riga --- */
        .row-middle-top {
            background-color: rgb(218, 112, 214); /* Fucsia con leggera sfumatura cipria */
            transition: background-color 0.3s ease;
        }

        .row-middle-top:hover {
            background-color: rgba(255, 0, 255, 0.8); /* Fucsia sulla riga */
        }

        .button-mid-top {
            color: #ffffff;
            border: 3px double rgba(255, 255, 255, 0.4);
            border-radius: 6px;
            font-size: 1.3em;
            text-transform: uppercase;
            font-weight: bold;
            background: transparent;
            cursor: pointer;
            transition: background 0.3s, color 0.3s;
            width: 180px;
            height: 70px;
            padding: 0;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;

            position: relative;
            top: -4px;
            left: -4px;
        }
        .button-mid-top::after {
            display: block;
            width: 180px;
            height: 70px;
            padding: 0;
            box-sizing: border-box;

            border: 3px double rgba(255, 255, 255, 0.4);
            border-radius: 6px;

            position: absolute;
            top: 5px;
            left: 5px;
            content: '';
            
            transition: all 0.3s ease;
        }
        .button-mid-top:hover {
            background: rgba(255, 255, 255, 0.2);
            color: black;
        }
        .button-mid-top:hover::after {
            top: 0;
            left: 0;
        }


        /* --- Terza Riga (Elemento Creativo) --- */
        .row-middle-bottom {
            background-color: #ffffff;
            /* Nuovo pattern: Rombo centrale e Rombi sparsi */
        }

        /* Rombo centrale che contiene il testo */
        .diamond-text-container {
            position: relative;
            z-index: 2;
            padding: 20px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .diamond-text-container:hover {
            transform: scale(1.05);
        }

        .diamond-text-container:hover .diamond-bg {
            background: rgba(128, 128, 128, 0.3);
        }

        .diamond-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 140px;
            height: 140px;
            background: rgba(128, 128, 128, 0.2); /* Grigio semitrasparente */
            border: none;
            border-radius: 6px;
            transform: translate(-50%, -50%) rotate(45deg);
            z-index: -1;
        }

        .button-mid-bottom {
            color: #000000;
            font-size: 1.3em;
            font-style: normal;
            border: none;
            background: transparent;
            text-transform: uppercase;
            font-weight: bold;
        }

        /* Rombi Sparsi di Sfondo */
        .scattered-shape {
            position: absolute;
            transform: rotate(45deg);
            border-radius: 8px; /* Angoli più arrotondati */
            opacity: 0.6;
        }

        .scattered-shape.small {
            width: 25px;
            height: 25px;
        }
        .scattered-shape.large {
            width: 80px;
            height: 80px;
        }

        /* Colori e Posizioni per i Rombi */
        .s-1 { background-color: #add8e6; top: 10%; left: 5%; }
        .s-2 { background-color: #ffe4b5; bottom: 8%; left: 3%; width: 50px; height: 50px;}
        .s-3 { background-color: #d8bfd8; top: 5%; right: 15%; width: 40px; height: 40px;}
        .s-4 { background-color: #f08080; top: 50%; right: 2%; width: 60px; height: 60px;}
        .s-5 { background-color: #98fb98; bottom: 5%; right: 10%; }
        .s-6 { background-color: #dda0dd; top: 20%; right: 25%; }
        .s-7 { background-color: #b0e0e6; bottom: 20%; left: 2%; }
        .s-8 { background-color: #f5deb3; top: 65%; left: 20%; }
        .s-9 { background-color: #e6e6fa; top: 35%; right: 30%; width: 80px; height: 80px;}
        .s-10 { background-color: #ffdab9; bottom: 40%; left: 30%; width: 70px; height: 70px;}
        .s-11 { background-color: #ffb6c1; top: 75%; left: 10%; }
        .s-12 { background-color: #afeeee; bottom: 25%; right: 8%; }
        .s-13 { background-color: #f0e68c; top: 25%; left: 40%; }
        .s-14 { background-color: #d3d3d3; bottom: 60%; right: 20%; }
        .s-15 { background-color: #dda0dd; top: 85%; right: 35%; }
        .s-left { background-color: #87ceeb; top: 40%; left: 2%; width: 90px; height: 90px; }
        .s-17 { background-color: #f5deb3; bottom: 15%; left: 60%; width: 75px; height: 75px;}

        /* --- Quarta Riga (In Basso) --- */
        .row-bottom {
            background-color: #f08080; /* Crimson chiaro */
        }

        .button-bottom {
            color: #000000;
            border: 2px solid #000000;
            border-radius: 10px;
            padding: 15px 45px;
            font-size: 1.3em;
            text-transform: uppercase;
            font-weight: bold;
            background: transparent;
            cursor: pointer;
            transition: background 0.3s, color 0.3s;
        }
        .button-bottom:hover {
            background: rgba(255, 255, 255, 1);
            color: #000000;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row row-top">
        <button class="button-top">THESE</button>
    </div>

    <div class="row row-middle-top">
        <button class="button-mid-top">are</button>
    </div>

    <div class="row row-middle-bottom">
        <div class="scattered-shape large s-left"></div>
        <div class="scattered-shape small s-1"></div>
        <div class="scattered-shape small s-2"></div>
        <div class="scattered-shape small s-3"></div>
        <div class="scattered-shape small s-4"></div>
        <div class="scattered-shape small s-5"></div>
        <div class="scattered-shape small s-6"></div>
        <div class="scattered-shape small s-7"></div>
        <div class="scattered-shape small s-8"></div>
        <div class="scattered-shape small s-9"></div>
        <div class="scattered-shape small s-10"></div>
        <div class="scattered-shape small s-11"></div>
        <div class="scattered-shape small s-12"></div>
        <div class="scattered-shape small s-13"></div>
        <div class="scattered-shape small s-14"></div>
        <div class="scattered-shape small s-15"></div>
        <div class="scattered-shape large s-16"></div>
        <div class="scattered-shape large s-17"></div>

        <div class="diamond-text-container">
            <div class="diamond-bg" style="border-radius: 6px;"></div>
            <button class="button-mid-bottom" style="font-size: 1.3em; font-weight: bold;">ghost</button>
        </div>
    </div>

    <div class="row row-bottom">
        <button class="button-bottom" style="font-size: 1.3em; font-weight: bold;">buttons</button>
    </div>
</div>

</body>
</html>
