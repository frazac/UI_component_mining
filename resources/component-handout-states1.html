<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI Components Mining . States of interaction . Francesco Zaccaria</title>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <link type="text/css" rel="stylesheet" href="tipografia.css">
    <link type="text/css" rel="stylesheet" href="stile.css">
    <!-- Matomo -->
    <script>
        var _paq = window._paq || window._paq || [];
        /* tracker methods like "setCustomDimension" should be called before "trackPageView" */
        _paq.push(['trackPageView']);
        _paq.push(['enableLinkTracking']);
        (function () {
            var u = "https://matomo.masterismi.com/";
            _paq.push(['setTrackerUrl', u + 'matomo.php']);
            _paq.push(['setSiteId', '15']);
            var d = document,
                g = d.createElement('script'),
                s = d.getElementsByTagName('script')[0];
            g.async = true;
            g.src = u + 'matomo.js';
            s.parentNode.insertBefore(g, s);
        })();
    </script>
    <!-- End Matomo Code -->
    <style>
        a:link {
            color: red;
        }

        a:visited {
            color: green;
        }

        a:hover {
            color: hotpink;
        }

        .hover {
            color: hotpink !important;
        }

        a:active {
            color: blue;
        }

        .active {
            color: blue !important;
        }

        a:focus {
            outline: 2px solid purple;
            outline-offset: 3px;
        }

        .focus {
            outline: 2px solid purple !important;
            padding: 3px;
            outline-offset: 3px;
        }

        .cursor-hand {
            position: absolute;
            width: 32px;
            height: 32px;
            pointer-events: none;
            z-index: 10;
            background-image: url('hand-cursor.png');
            background-size: contain;
            background-repeat: no-repeat;
        }

        .link-container {
            position: relative;
            display: inline-block;
        }

        .content-container {
            width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
    </style>
</head>

<body>
    <div class="content-container">
        <p><a href="https://lorem" target="_blank">This is a link</a></p>
        <p><a href="https://google.com" target="_blank">This is a visited link</a></p>
        <p>
            <div class="link-container">
                <div class="cursor-hand" style="top: -8px; right: -35px;"></div>
                <a href="https://lorem" target="_blank" class="hover">This is how a link render when the mouse is over</a>
            </div>
        </p>
        <p><a href="https://lorem" target="_blank" class="active">This is how a link render when is active</a></p>
        <p><a href="https://lorem" target="_blank" class="focus">This is how a link render when is focused</a></p>
    </div>
</body>

</html>
